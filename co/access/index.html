<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CornerStone | Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Teko:wght@400;500;600;700&family=Roboto+Condensed:wght@300;400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/co/app.css" />
  </head>
  <body data-page="access">
    <main class="pixel-page page-access" aria-label="CornerStone access">
      <div class="wallet-cover" data-wallet-cover>
        <button type="button" data-connect><span></span><b>Wallet Connect</b><small>Not connected</small></button>
        <em>⌁ Live Wallet Mode</em>
      </div>
      <nav class="hot-nav" aria-label="Primary">
        <a class="nav-hot dashboard-hot" href="../"></a>
        <a class="nav-hot proof-hot" href="../proof/"></a>
        <a class="nav-hot access-hot active" href="./"></a>
        <a class="nav-hot squad-hot" href="../squad/"></a>
        <button class="nav-hot console-hot" type="button" data-modal-trigger="console"></button>
        <button class="nav-hot wallet-hot" type="button" data-connect></button>
      </nav>
      <button class="hot-card access-open-top" type="button" data-modal-trigger="ama"></button>
      <button class="hot-card access-card-ama" type="button" data-modal-trigger="ama"></button>
      <button class="hot-card access-card-merch" type="button" data-modal-trigger="locked"></button>
      <button class="hot-card access-card-arena" type="button" data-modal-trigger="locked"></button>
    </main>
    <dialog class="cs-modal" data-modal><div><h2 data-modal-title></h2><p data-modal-body></p><button type="button" data-close-modal>Continue</button></div></dialog>
    <script src="/co/app.js"></script>
  </body>
</html>
